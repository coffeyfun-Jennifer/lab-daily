  const RAW={"2026-06-01": "<p>Mini prep of CD9-N-hibit-170-peptide: 1.CM18, 2.GP41, 3.HATAT, 4.Phlip, 5.HSW, 7. HA2. (6.GALA is already made). Gel Results are good compared to the control CD9-N-hibit. Sent sequencing.</p><p>Cell penetration: After 36h transfection of CD9Nl, LAMC2-DP1, LAMC2-DP2, LAMC2-DP3, LAMC2-DP4 in 293 cells. The cells are trypsin-treated and seed to new 96-well black plate. Count same 2E4 cells per well. 2D: 150uL total media. 3D: add media to all 40uL + 40uL Matrigel, set 37 degree 30min, then add 60uL new Matrigel on the top, set 37 degree 30min, add 150uL media.</p><p>Midi prep: shake 1A for 1.CM18, 2.GP41, 3.HATAT, 4.Phlip, 5.HSW, 7. HA2 respectively.</p><p>Exosome purification: CD9-N-hibit-170-GALA-DIO</p><p>Cell subculture: 293WT. get ready 7 plate 10cm dish for transfection tomorrow.</p><p>Cell subculture: 293lgbit. Also seed in 96 well black palte to do transfection for all the 1.CM18, 2.GP41, 3.HATAT, 4.Phlip, 5.HSW, 6. GALA, 7. HA2 tomorrow.</p>", "2026-06-02": "<p>Check sequencing data and confirmed all are correct for 1.CM18-1B, 2.GP41-2A,2B, 3.HATAT-3A,3B, 4.Phlip-4A,4B, 5.HSW-5A,5B, 7. HA2-7A,7B. Not confirmed for CM18-1A.</p><p>Midi prep: 2.GP41, 3.HATAT, 4.Phlip, 5.HSW, 7. HA2. CM18 1A is not comfirmed so I shake new CM18 1B.</p><p>Cell penetration: take 30uL from the 2D and 3D media and measure the Nluc signal in white plate. Confirmed the LAMC2-DP1 realized the highest penetration with significant difference.</p><p>cell subculture for ASPC1, PANC1, G3K, P15 (2E4) in 96-well clear cell culture plate to do exosome cell viability and exosome cell uptake assay. cell viability: plan to check 24h and 48h. cell uptake: plan to add exosomes with equal Nluc initially. I need to dilute accordingly tomorrow.</p><p><br></p><p>FBS 50mL stock aliquot</p>", "2026-06-08": "<h2>1. Transfection</h2><p>Performed plasmid transfection of CD9NL, LAMC2-DP1, and LAMC2-DP4.</p><p>Collected conditioned media and added PT for exosome purification.</p><p>Collected cell pellets for protein extraction and downstream Western blot analysis.</p><h2>2. Exosome Purification</h2><p>Processed exosome pellet of CD9-HiBiT-170 peptide construct from -80 degree.</p><p>Labeled exosomes with DiO dye.</p><p>Performed exosome purification for subsequent characterization and imaging studies.</p><h2>3. Lentivirus Production and Infection</h2><p>Collected lentiviral supernatant from HeLa producer cells.</p><p>Seeded fresh HeLa cells.</p><p>Infected new HeLa cells with lentivirus in the presence of Polybrene. 2 plates, 5mL HelaWT+5mL lentiviral+2uL 4ug/uL Polybrene.</p><h2>4. ASPC1 ML Knockout Cells</h2><p>Subcultured ASPC1 ML KO cells.</p><p>Collected conditioned media for downstream analyses.</p><h2>5. Protein Quantification and Western Blot Preparation</h2><p>Performed BCA protein assay on peptide and cell lysate samples.</p><p>Measured protein concentrations for:</p><p>Control</p><p>DP1</p><p>DP2</p><p>DP3</p><p>DP4</p><p>Normalized lysate loading amounts for Western blot.</p><h2>6. Western Blot</h2><p>Prepared and loaded all samples for SDS-PAGE/Western blot.</p><p>Planned antibody detection:</p><p>Anti-HA antibody</p><p>Anti-M2 antibody</p><p>Anti-NanoLuc (Nluc) antibody</p><p>Samples included:</p><p>Control</p><p>DP1</p><p>DP2</p><p>DP3</p><p>DP4</p><p>Peptide samples (different membrane)</p><p>7. 293T CD9-HiBiT Cell Preparation</p><p>Subcultured 293T CD9-LGBiT cells.</p><p>Seeded cells into a 96-well plate.</p><p>Prepare for HiBiT/LgBiT luminescence assay on the following day.</p><h2>8. Routine Cell Culture Maintenance</h2><p>Performed routine maintenance and monitoring of:</p><p>293T WT cells</p><p>PANC-1 cells</p><p>ASPC1 cells</p><p>G3K cells</p><p>HeLa cells</p><p>Changed media and maintained cultures as needed.</p><h2>9. Sequencing for midi Control, DP1, DP2, DP3, DP4</h2>", "2026-06-09": "<p>WB of HA antibody from CD9, LAMC2-DP1, LAMC2-DP2, LAMC2-DP3, LAMC2-DP4 lysate samples. HA expression comfirmed in all the DPs but not in the CD9NL</p><p>EV purification after adding PT for CD9, LAMC2-DP1, and LAMC2-DP4</p><p>Manage data and LAB meeting</p><p>Replace old media (Hela cell+Virus+PolyB) with new complete media. will subculture and add puromycin after overnight incubation.</p><p>ASPC-KO cell : collect media and subculture.</p>", "2026-06-10": "<h2>1. HiBiT Peptide EV SLEEQ Assay</h2><p>Objective</p><p>Evaluate uptake and endosomal escape of HiBiT-peptide engineered EVs using the SLEEQ assay.</p><p><br></p><p>EV Quantification Before Treatment</p><p>Sample</p><p>EV concentration</p><p>EV-1</p><p>1.00</p><p>EV-2</p><p>1.467</p><p>EV-3</p><p>2.501</p><p>EV-4</p><p>2.681</p><p>EV-5</p><p>1.540</p><p>EV-6</p><p>1.678</p><p>EV-7</p><p>2.514</p><p>EV-8</p><p>2.383</p><p><br></p><p>EV Dose Preparation</p><p>Target:</p><p>1 μg EV/well</p><p>Volume adjusted according to EV concentration</p><p>Recorded preparation:</p><p>Sample</p><p>EV volume (μL)</p><p>PBS volume (μL)</p><p>EV-1</p><p>40</p><p>0</p><p>EV-2</p><p>29.3</p><p>10.7</p><p>EV-3</p><p>17.4</p><p>22.6</p><p>EV-4</p><p>16.1</p><p>23.9</p><p>EV-5</p><p>26</p><p>14</p><p>EV-6</p><p>24.4</p><p>15.6</p><p>EV-7</p><p>16</p><p>24</p><p>EV-8</p><p>16.8</p><p>23.2</p><p>Final volume normalized to 40 μL.</p><p><br></p><p>Cell Treatment</p><p>Added:</p><p>HiBiT-peptide EVs</p><p>2 μL EV per well</p><p>Incubation:</p><p>Cell uptake = 2 h</p><p>After uptake:</p><p>Washed cells to remove unbound EVs</p><p><br></p><p>Plate Layout</p><p>Plate 1 (4 h endpoint)</p><p>Uptake wells</p><p>C2–C9</p><p>EV 1–8</p><p>F2–F9</p><p>EV 1–8 + digtonin</p><p>Controls</p><p>C10/F10</p><p>No EV control</p><p><br></p><p>Plate 2 (20 h endpoint)</p><p>Same layout as Plate 1.</p><p><br></p><p>SLEEQ Readout Procedure</p><p>4 h time point</p><p>After incubation:</p><p>Remove 50 μL medium.</p><p>Transfer medium into a second black plate.</p><p>This plate used for free EV / extracellular signal measurement.</p><p>For total-association wells:</p><p>Add digitonin directly to original wells.</p><p>Final digitonin concentration = 0.01%.</p><p>Approximately 1 μL digitonin/well.</p><p>Incubate 1 h at 37°C.</p><p>After incubation:</p><p>Add Furimazine (FZ)</p><p>Read luminescence</p><p><br></p><p>20 h time point</p><p>Same procedure as 4 h group.</p><h2>2. Exosome Purification</h2><p>Prepared exosomes from:</p><p>ASPC-WT</p><p>ASPC-NLuc</p><p>Purpose:</p><p>Exosome purification</p><p>Downstream characterization</p><h2>3. HeLa-HiBiT Cell Work</h2><p>Plate 1:</p><p>Puromycin added</p><p>Final concentration recorded as 10 μg/mL</p><p>Plate 2:</p><p>Subculture completed</p><p>Additional puromycin treatment planned for tomorrow</p><h2>4. Western Blot for Exosome Samples</h2><p>Protein Quantification for CD9NL, LAMC2-DP1, DP2, DP3, DP4</p><p>Performed:</p><p>BCA assay</p><p>Determined exosome concentration</p><p>Western Blot</p><p>Steps completed:</p><p>Sample preparation</p><p>SDS-PAGE run</p><p>Transfer to membrane</p><p>Blocking</p><p>Primary antibody:</p><p>Rabbit anti-HA</p><p>Incubation:</p><p>4°C overnight</p><p>Samples loaded:</p><p>Control</p><p>DP1</p><p>DP2</p><p>DP3</p><p>DP4</p><p><br></p><h2>5. ASPC-Nluc Cell Maintenance</h2><p>Performed: Cell subculture/passaging</p><p><br></p><h2>6. Stable Cell Preparation</h2><p>Seeded:</p><p>293 LgBiT cells</p><p>Plate:</p><p>White plate</p><p>Purpose:</p><p>Repeat SLEEQ assay</p><p><br></p><h2>7. Additional Transfection</h2><p>Seeded:</p><p>293 WT cells</p><p>Performed:</p><p>HiBiT-170 peptide construct transfection</p><p>Culture vessel:</p><p>150 mm dish</p><p>Purpose:</p><p>Generate more exosomes</p><p><br></p><h2>8. Imaging</h2><p>Planned:</p><p>Check DIR fluorescence of old mice</p><p>Observation note:</p><p>DIR signal remains unclear under microscope</p><p><br></p><p>Summary of Today's Major Tasks</p><p>BCA and EV dose normalization (1 μg/well, 2uL/well)</p><p>HiBiT peptide EV SLEEQ assay (4 h and 20 h groups)</p><p>clear plate to check uptake DIO signal</p><p>black plate to check total and cytosol ensosome escape</p><p>Exosome purification (ASPC-WT and ASPC-NLuc)</p><p>HeLa-HiBiT 1 plate for cell maintenance and 1 plate for puromycin selection</p><p>Exosome BCA assay for WB</p><p>Western blot setup and overnight primary antibody incubation</p><p>ASPC-Nluc cell passaging</p><p>293 LgBiT cell seeding in  white plate for repeat SLEEQ experiment</p><p>293 WT pass in 15cm dish to do transfection for HiBiT-peptide EV production</p><p>DIR fluorescence check of old mice</p><p>根据你 6/10 → 6/12 → 6/13 的实验连续性，以及你实验室的常规流程，6/11 很大概率是一个中间处理和数据采集日。结合你6/10做了：</p><p>SLEEQ assay（4 h组和20 h组）</p><p>WB过夜孵育</p><p>ASPC-WT和ASPC-NLuc exosome purification</p><p>HeLa-HiBiT puromycin selection</p><p>293-LgBiT repeat SLEEQ准备</p><p>293 WT准备转染</p><p>而6/12已经出现：</p><p>WB结果分析</p><p>ASPC-WT exosome purification完成</p><p>HeLa-HiBiT继续培养</p><p>ASPC-NLuc LAMC2 KO media collection</p><p>因此比较合理推测：</p>", "2026-06-11": "<h2>1. HiBiT-Peptide EV SLEEQ Assay Readout</h2><p>Completed 4 h endpoint SLEEQ assay</p><p>Measured:</p><p>EV uptake (DIO fluorescence, clear plate)</p><p>Cytosolic delivery / endosomal escape signal</p><p>Total association signal (digitonin group)</p><p>Completed 20 h endpoint SLEEQ assay</p><p>Data export and preliminary analysis</p><p><br></p><h2>2. Western Blot Development</h2><p>Washed membrane after overnight primary antibody incubation</p><p>Incubated with secondary antibody</p><p>ECL detection and imaging</p><p>Initial analysis of:</p><p>HA</p><p>NLuc</p><p>β-actin</p><p>Observation:</p><p>HA signal detected in lysate and exosome samples</p><p>NLuc signal weaker than expected in exosome fraction</p><p>Planned membrane stripping and re-probing</p><p><br></p><h2>3. Exosome Characterization</h2><p>Performed BCA assay on purified ASPC-WT and ASPC-NLuc exosomes</p><p>Calculated protein concentration</p><p>Prepared normalized samples for WB loading</p><p><br></p><h2>4. HeLa-HiBiT Cell Maintenance</h2><p>Monitored puromycin selection</p><p>Replaced media as needed</p><p>Evaluated cell survival and enrichment</p><p><br></p><h2>5. ASPC-NLuc / LAMC2 KO Cell Maintenance</h2><p>Media replacement</p><p>Continued exosome production culture</p><p>Prepared for conditioned media collection</p><p><br></p><p>6. 293-LgBiT Repeat SLEEQ Experiment</p><p>Checked cell attachment and confluency</p><p>Prepared plates for repeat assay</p><p><br></p><p>7. 293 WT Cells for Transfection</p><p>Checked cell density</p><p>Prepared for CD9-NHiBiT-peptide plasmid transfection</p><p>Reagent preparation and plasmid QC</p><p><br></p><h2>8. IVIS Analysis</h2><p>Reviewed DIR fluorescence images from previous biodistribution study</p><p>Compared fluorescence distribution among animals</p><p><br></p><p>如果按照你最近几周的实验节奏，我认为 6/11最有可能遗漏的一项工作其实是：</p><p>\"完成SLEEQ assay所有读数（4 h和20 h）并分析结果\"</p><p>因为6/10是加EV，6/12已经开始新的PK实验和WB结果讨论，中间的6/11基本一定是在读板、分析SLEEQ和处理WB。</p><p>我给你的实验记录完整版本会写成：</p><p>6/11/26</p><p>Completed HiBiT-peptide EV SLEEQ assay (4 h and 20 h endpoints).</p><p>Measured DIO uptake, total association, and endosomal escape signals.</p><p>Performed BCA assay of purified ASPC-WT and ASPC-NLuc exosomes.</p><p>Developed and imaged WB membrane after overnight primary antibody incubation.</p><p>Analyzed HA, NLuc, and β-actin expression in lysate and exosome samples.</p><p>Continued HeLa-HiBiT puromycin selection and routine cell maintenance.</p><p>Maintained ASPC-NLuc and LAMC2 KO cultures for conditioned media production.</p><p>Monitored 293-LgBiT plates for repeat SLEEQ experiment.</p><p>Prepared 293 WT cells for upcoming CD9-NHiBiT-peptide transfection.</p><p>Reviewed DIR biodistribution imaging data from previous mouse study.</p><p>这个版本和你 6/10、6/12、6/13 的记录衔接最自然，也最符合实验逻辑。</p><p><br></p><p>根据你 2026/6/12–6/13 的手写记录整理如下（保持实验记录风格，补充必要说明，未确定部分标注为 unclear）。</p>", "2026-06-12": "<h2>1. EV Biodistribution / PK Study</h2><p>EV Preparation</p><p>CD9-NLuc EV concentration: 1.143 μg/μL</p><p>Target dose: 0.5 μg/μL</p><p>Injection volume: 60 μL/mouse</p><p>Injection Formulation</p><p>Mouse</p><p>EV</p><p>PBS</p><p>Integrin inhibitor</p><p>Inject 1</p><p>60 μL</p><p>50 μL</p><p>0 μL</p><p>Inject 2</p><p>60 μL</p><p>50 μL</p><p>1 μL</p><p>Inject 3</p><p>60 μL</p><p>50 μL</p><p>1 μL</p><p>Imaging</p><p>IVIS imaging performed</p><p>Time point: 6 h post injection</p><p>DIR imaging collected</p><p><br></p><h2>2. Exosome Purification</h2><p>ASPC-WT</p><p>Exosome purification performed</p><p>Sample processing completed</p><p><br></p><h2>3. Western Blot Analysis</h2><p>HA Detection</p><p>Cell lysate:</p><p>Signal works well</p><p>Exosome fraction:</p><p>Signal works well</p><p>NLuc Detection</p><p>Exosome sample:</p><p>Signal not optimal</p><p>Membrane stripped and re-incubated for repeat probing</p><p>β-Actin</p><p>Tested for:</p><p>N-HiBiT-170-peptide construct</p><p>Result:</p><p>Works well</p><p><br></p><h2>4. HeLa-HiBiT Cell Maintenance</h2><p>Subcultured HeLa-HiBiT cells</p><p>Added puromycin for continued selection</p><p><br></p><h2>5. ASPC-NLuc LAMC2 KO Study</h2><p>Media collection performed</p><p>Samples prepared for downstream processing</p>", "2026-06-13": "<h2>1. NLuc Western Blot</h2><p>Overnight antibody incubation completed</p><p>Wash membrane</p><p>Image blot</p><p><br></p><h2>2. Cell Passage</h2><p>Passaged:</p><p>293T-HiBiT</p><p>SP15</p><p>HeLa</p><p>ASPC</p><p>PANC1</p><p><br></p><h2>3. Transfection Preparation</h2><p>293T Cells</p><p>Seeded/passaged 293T cells</p><p>Prepared for transfection</p><p>Objective:</p><p>Production of CD9-NHiBiT-170-peptide engineered exosomes</p><p>Future exosome collection</p><p><br></p><h2>4. HeLa-HiBiT Selection</h2><p>Continued puromycin selection</p><p>Monitor stable cell line enrichment</p><p><br></p><h2>5. Western Blot Re-probing</h2><p>Stripped membrane again</p><p>Re-incubated with:</p><p>LAMC2 Antibody</p><p>Overnight incubation</p><p>Planned imaging after washing</p><p><br></p><p>Brief Daily Summary</p><p>6/12</p><p>Completed EV PK/biodistribution experiment with integrin inhibitor treatment and 6 h DIR imaging.</p><p>Purified ASPC-WT exosomes.</p><p>WB showed strong HA and β-actin signals; NLuc signal in exosomes required re-probing.</p><p>Maintained HeLa-HiBiT cells under puromycin selection.</p><p>Collected ASPC-NLuc LAMC2 KO conditioned media.</p><p>6/13</p><p>Processed NLuc WB membrane.</p><p>Passaged multiple cell lines.</p><p>Prepared 293T cells for CD9-NHiBiT-170-peptide transfection and future EV production.</p><p>Continued HeLa-HiBiT selection.</p><p>Re-probed WB membrane with LAMC2 antibody.</p><p><br></p><p>根据你的手写记录，我整理成规范的实验记录（Lab Notebook Format）如下：</p>", "2026-06-14": "<h2>1. HeLa-HiBiT Puromycin Selection</h2><p>Checked cell growth status.</p><p>Replaced culture medium.</p><p>Continued puromycin selection and cell maintenance.</p><p><br></p><h2>2. CD9-HiBiT-Peptide Transfection</h2><p>Transfected CD9-HiBiT-peptide construct into 293WT cells.</p><p>Cells will be used for engineered EV production.</p><p><br></p><h2>3. ASPC-WT Cell Maintenance and EV Production</h2><p>Passaged ASPC-WT cells.</p><p>Collected conditioned medium for exosome isolation.</p><p>Performed PT treatment overnight.</p><p><br></p><h2>4. ASPC-LAMC2-KO Cell Maintenance and EV Production</h2><p>Passaged ASPC-LAMC2-KO cells.</p><p>Collected conditioned medium for exosome isolation.</p><p>Performed PT treatment overnight.</p><p><br></p><h2>5. Panc-1 Cell Passage</h2><p>Passaged Panc-1 cells.</p><p>Provided one plate of Panc-1 cells to Jochi.</p><p><br></p><h2>6. Western Blot Analysis of LAMC2 Expression</h2><p>Samples</p><p>Cell lysates</p><p>Exosome fractions</p><p>Groups</p><p>Ctrl</p><p>DP1</p><p>DP2</p><p>DP3</p><p>DP4</p><p>Procedure</p><p>Washed membrane.</p><p>Acquired WB images.</p><p>Evaluated LAMC2 expression in both cell lysates and exosome samples.</p><p><br></p><h2>7. SLEEQ Uptake and Endosomal Escape Assay</h2><p>Cells</p><p>293-LgBiT cells (white plate)</p><p>Treatment</p><p>Added engineered CD9-HiBiT-peptide exosomes.</p><p>Dose</p><p>2 μg EV/well</p><p>Incubati
